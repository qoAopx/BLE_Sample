<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetry iPhone Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        :root {
            --bg-color: #0d0e11;
            --accent-blue: #00e1ff;
            --accent-green: #46ff21;
            --accent-red: #ff4a4a;
            --text-main: #f0f0f0;
            --border-color: #3a3a3a;
        }

        body { 
            margin: 0; padding: 0; 
            background: var(--bg-color); 
            color: var(--text-main);
            font-family: 'SF Pro Display', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ヘッダー */
        header {
            height: 50px;
            background: #151515;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 2px solid var(--accent-blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .title { font-size: 1rem; font-weight: bold; letter-spacing: 1.5px; color: var(--accent-blue); }

        .btn-group { display: flex; gap: 8px; }
        button {
            padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border-color);
            background: #252525; color: white; cursor: pointer; font-weight: bold; font-size: 0.8rem; transition: 0.2s;
        }
        button:hover { background: #353535; border-color: var(--accent-blue); }
        .btn-connect { background: #0056b3; border-color: var(--accent-blue); }
        .btn-connect:hover { background: #006ee0; }

        /* p5.js キャンバスコンテナ */
        #canvas-container {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* ステータスバー（画面最下部） */
        .status-bar {
            height: 30px;
            background: #111;
            padding: 0 15px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #777;
            border-top: 1px solid #222;
        }
        #status-text { color: var(--accent-blue); font-weight: bold; }
        #raw-data { font-family: 'Courier New', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60%; }

    </style>
</head>
<body>

<header>
    <div class="title">CAR TELEMETRY</div>
    <div class="btn-group">
        <button class="btn-connect" onclick="connectBLE()">CONNECT</button>
        <button onclick="disconnectBLE()">DISCON</button>
    </div>
</header>

<div id="canvas-container">
    </div>

<div class="status-bar">
    <div>SYS: <span id="status-text">DISCONNECTED</span></div>
    <div id="raw-data">REC: waiting...</div>
</div>

<script>
// --- BLE Logic ---
const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
const CHARACTERISTIC_UUID = "abcdefab-1234-5678-1234-abcdefabcdef";
let device = null;
let accelX = 0, accelY = 0, accelZ = 1.0; 
let rollVal = 0, pitchVal = 0;
let historyZ = [];
let maxHistory = 50; // iPhoneの画面幅に合わせて履歴数を減らす

async function connectBLE() {
    try {
        const st = document.getElementById("status-text");
        st.innerText = "SEARCHING...";
        st.style.color = "orange";
        device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        device.addEventListener('gattserverdisconnected', () => {
            st.innerText = "DISCONNECTED";
            st.style.color = "var(--accent-red)";
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const char = await service.getCharacteristic(CHARACTERISTIC_UUID);
        await char.startNotifications();
        char.addEventListener('characteristicvaluechanged', handleNotify);
        st.innerText = "CONNECTED";
        st.style.color = "var(--accent-green)";
    } catch (e) {
        const st = document.getElementById("status-text");
        st.innerText = "ERROR";
        st.style.color = "var(--accent-red)";
        console.error(e);
    }
}

function disconnectBLE() { if(device) device.gatt.disconnect(); }

function handleNotify(event) {
    const value = new TextDecoder().decode(event.target.value);
    document.getElementById("raw-data").innerText = "REC: " + value;

    const mX = value.match(/X:\s*(-?[\d.]+)/);
    const mY = value.match(/Y:\s*(-?[\d.]+)/);
    const mZ = value.match(/Z:\s*(-?[\d.]+)/);
    const mR = value.match(/Roll:\s*(-?[\d.]+)/);
    const mP = value.match(/Pitch:\s*(-?[\d.]+)/);

    // 1000を1.0Gとして計算（スケーリング）
    if (mX) accelX = parseFloat(mX[1]) / 1000;
    if (mY) accelY = parseFloat(mY[1]) / 1000;
    if (mZ) accelZ = parseFloat(mZ[1]) / 1000;
    if (mR) rollVal = parseFloat(mR[1]);
    if (mP) pitchVal = parseFloat(mP[1]);

    // 履歴追加
    historyZ.push(accelZ);
    if (historyZ.length > maxHistory) historyZ.shift();
}

// --- p5.js Rendering ---
