<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemetry Vertical v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; 
            background: #0d0e11; 
            color: #f0f0f0;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* iPhoneのノッチ等を考慮したヘッダー */
        header {
            height: 60px;
            background: #1a1b1f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 2px solid #00e1ff;
            box-sizing: border-box;
        }

        .btn-group { display: flex; gap: 10px; }
        button {
            padding: 8px 15px; border-radius: 8px; border: 1px solid #444;
            background: #2a2c32; color: white; cursor: pointer; font-weight: bold; font-size: 0.8rem;
        }
        .btn-connect { background: #0056b3; border-color: #00e1ff; }

        /* キャンバス領域 */
        #canvas-container {
            flex: 1;
            width: 100%;
            position: relative;
        }

        /* フッター：生データ表示用 */
        footer {
            height: 50px;
            background: #111;
            padding: 0 15px;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-top: 1px solid #222;
            color: #888;
        }
        #status { color: #00e1ff; font-weight: bold; }
        #count { font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1rem; font-weight: bold; color: #00e1ff;">TELEMETRY</div>
    <div class="btn-group">
        <button class="btn-connect" onclick="connectBLE()">CONNECT</button>
        <button onclick="disconnectBLE()">DISCONNECT</button>
    </div>
</header>

<div id="canvas-container"></div>

<footer>
    <div>SYSTEM: <span id="status">ready</span></div>
    <div id="count">DATA: -</div>
</footer>

<script>
// --- BLE Logic (元スケッチを維持) ---
const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
const CHARACTERISTIC_UUID = "abcdefab-1234-5678-1234-abcdefabcdef";
let device = null;
let characteristic = null;

let accelX = 0, accelY = 0, accelZ = 1.0; 
let rollVal = 0, pitchVal = 0;
let historyZ = [];
const MAX_HISTORY = 60;

async function connectBLE(){
 try{
  document.getElementById("status").innerText="select device...";
  device = await navigator.bluetooth.requestDevice({ filters:[{services:[SERVICE_UUID]}] });
  device.addEventListener('gattserverdisconnected', onDisconnected);
  const server = await device.gatt.connect();
  const service = await server.getPrimaryService(SERVICE_UUID);
  characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
  await characteristic.startNotifications();
  characteristic.addEventListener('characteristicvaluechanged', handleNotify);
  document.getElementById("status").innerText="CONNECTED";
 } catch(e){
  document.getElementById("status").innerText="ERROR: " + e;
 }
}

function disconnectBLE(){ if(device && device.gatt.connected) device.gatt.disconnect(); }
function onDisconnected(){ document.getElementById("status").innerText="DISCONNECTED"; }

 document.getElementById("count").innerText = "DATA: " + value;
