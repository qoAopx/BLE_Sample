<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telemetry Mobile - 3D Single View</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        header { height: 60px; display: flex; align-items: center; justify-content: space-around; background: #111; border-bottom: 1px solid #333; z-index: 100; }
        button { padding: 10px 20px; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; }
        .btn-c { background: #007bff; color: white; }
        .btn-d { background: #444; color: white; }
        #canvas-container { flex: 1; width: 100%; position: relative; }
        footer { height: 50px; font-size: 11px; padding: 5px 15px; background: #111; color: #888; border-top: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; justify-content: center; }
        #status { color: #00e1ff; font-weight: bold; }
        #count { font-family: monospace; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    </style>
</head>
<body>

<header>
    <button class="btn-c" onclick="connectBLE()">CONNECT</button>
    <button class="btn-d" onclick="disconnectBLE()">DISCONNECT</button>
</header>

<div id="canvas-container"></div>

<footer>
    <div id="status">STATUS: READY</div>
    <div id="count">DATA: -</div>
</footer>

<script>
// --- BLE設定 ---
const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
const CHARACTERISTIC_UUID = "abcdefab-1234-5678-1234-abcdefabcdef";

let device = null, characteristic = null;
let accelX = 0, accelY = 0, accelZ = 1.0, rollVal = 0, pitchVal = 0;

  let carModel;

function preload() {
  // 変換したobjファイルを読み込む
  carModel = loadModel('buggy.obj', true); 
}
  
async function connectBLE() {
    const status = document.getElementById("status");
    try {
        status.innerText = "SELECTING...";
        device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        device.addEventListener('gattserverdisconnected', () => status.innerText = "DISCONNECTED");
        
        status.innerText = "CONNECTING...";
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
        
        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', handleNotify);
        status.innerText = "CONNECTED";
    } catch (e) {
        status.innerText = "ERROR: " + e;
        console.error(e);
    }
}

function disconnectBLE() { if (device) device.gatt.disconnect(); }

function handleNotify(event) {
    const val = new TextDecoder().decode(event.target.value);
    document.getElementById("count").innerText = val;
    
    const mX = val.match(/X:\s*(-?[\d.]+)/);
    const mY = val.match(/Y:\s*(-?[\d.]+)/);
    const mZ = val.match(/Z:\s*(-?[\d.]+)/);
    const mR = val.match(/Roll:\s*(-?[\d.]+)/);
    const mP = val.match(/Pitch:\s*(-?[\d.]+)/);

    if (mX) accelX = parseFloat(mX[1]) / 1000;
    if (mY) accelY = parseFloat(mY[1]) / 1000;
    if (mZ) accelZ = parseFloat(mZ[1]) / 1000;
    if (mR) rollVal = parseFloat(mR[1]);
    if (mP) pitchVal = parseFloat(mP[1]);
}

// --- 描画レイアウト (3Dのみを中央に配置) ---
function setup() {
    let container = document.getElementById('canvas-container');
    createCanvas(container.offsetWidth, container.offsetHeight, WEBGL).parent(container);
}

function draw() {
    background(15);

    // ライティング設定
    ambientLight(150);
    pointLight(255, 255, 255, 0, -200, 200);

    // WEBGLの座標中心(0,0,0)に配置
    push();
    // iPhoneの縦長画面に合わせてモデルサイズを調整
    let scaleFactor = min(width, height) / 300;
    scale(scaleFactor);

    // 姿勢回転
    rotateX(radians(pitchVal)+Math.PI);
    rotateZ(-radians(rollVal));

// モデルの表示
  normalMaterial(); // または fill() など
  model(carModel);
     
    pop();
}

function windowResized() {
    let container = document.getElementById('canvas-container');
    resizeCanvas(container.offsetWidth, container.offsetHeight);
}

</script>
</body>
</html>
