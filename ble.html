<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Telemetry OK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        header { height: 60px; display: flex; align-items: center; justify-content: space-around; background: #111; border-bottom: 1px solid #333; z-index: 100; }
        button { padding: 10px 20px; font-weight: bold; border-radius: 5px; border: none; cursor: pointer; }
        .btn-c { background: #007bff; color: white; }
        .btn-d { background: #444; color: white; }
        #canvas-container { flex: 1; width: 100%; position: relative; }
        footer { height: 60px; font-size: 11px; padding: 5px 15px; background: #111; color: #888; border-top: 1px solid #333; }
        #status { color: #00e1ff; font-weight: bold; display: block; margin-bottom: 2px; }
        #count { font-family: monospace; word-break: break-all; }
    </style>
</head>
<body>

<header>
    <button class="btn-c" onclick="connectBLE()">CONNECT</button>
    <button class="btn-d" onclick="disconnectBLE()">DISCONNECT</button>
</header>

<div id="canvas-container"></div>

<footer>
    <div id="status">STATUS: READY</div>
    <div id="count">DATA: -</div>
</footer>

<script>
// --- [ble.js] 接続ロジック ---
const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
const CHARACTERISTIC_UUID = "abcdefab-1234-5678-1234-abcdefabcdef";
let device = null, characteristic = null;

// データ用変数
let accelX = 0, accelY = 0, accelZ = 1.0; 
let rollVal = 0, pitchVal = 0;
let historyZ = [];
const MAX_HISTORY = 100;

async function connectBLE() {
    const st = document.getElementById("status");
    try {
        st.innerText = "SELECTING...";
        device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
        device.addEventListener('gattserverdisconnected', onDisconnected);
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
        await characteristic.startNotifications();
        characteristic.addEventListener('characteristicvaluechanged', handleNotify);
        st.innerText = "CONNECTED";
    } catch (e) {
        st.innerText = "ERROR: " + e;
    }
}

function disconnectBLE() { if (device) device.gatt.disconnect(); }
function onDisconnected() { document.getElementById("status").innerText = "DISCONNECTED"; }

function handleNotify(event) {
    const decoder = new TextDecoder();
    const value = decoder.decode(event.target.value);
    document.getElementById("count").innerText = value;

    // パース処理
    const mX = value.match(/X:\s*(-?[\d.]+)/);
    const mY = value.match(/Y:\s*(-?[\d.]+)/);
    const mZ = value.match(/Z:\s*(-?[\d.]+)/);
    const mR = value.match(/Roll:\s*(-?[\d.]+)/);
    const mP = value.match(/Pitch:\s*(-?[\d.]+)/);

    if (mX) accelX = parseFloat(mX[1]) / 1000;
    if (mY) accelY = parseFloat(mY[1]) / 1000;
    if (mZ) accelZ = parseFloat(mZ[1]) / 1000;
    if (mR) rollVal = parseFloat(mR[1]);
    if (mP) pitchVal = parseFloat(mP[1]);

    historyZ.push(accelZ);
    if (historyZ.length > MAX_HISTORY) historyZ.shift();
}

// --- [3d.js] 描画ロジック ---
function setup() {
    let container = document.getElementById('canvas-container');
    createCanvas(container.offsetWidth, container.offsetHeight, WEBGL).parent(container);
}

function draw() {
    background(10);
    let h = height / 3;

    // 1. 3D姿勢 (上段)
    push();
    translate(0, -h + 20, 0); 
    draw3DPosture();
    pop();

    // 2. G-Gダイアグラム (中段)
    push();
    translate(0, 0, 0);
    drawGGDiagram(h * 0.7);
    pop();

    // 3. 振動グラフ (下段)
    push();
    // 枠の位置（translate）に波形を合わせる
    translate(0, h - 20, 0);
    drawVibrationGraph(width - 60, 60);
    pop();
}

function draw3DPosture() {
    ambientLight(180); 
    pointLight(255, 255, 255, 0, -200, 200);
    push();
    rotateX(radians(pitchVal));
    rotateZ(radians(rollVal));
    fill(0, 120, 255); stroke(255); strokeWeight(1);
    box(160, 20, 240); 
    translate(0, -15, -100);
    fill(255, 255, 0); noStroke();
    box(60, 12, 40);
    pop();
}

function drawGGDiagram(size) {
    noFill(); stroke(100); strokeWeight(2);
    ellipse(0, 0, size); 
    ellipse(0, 0, size * 0.5);
    line(-size/2, 0, size/2, 0);
    line(0, -size/2, 0, size/2);

    let px = accelX * (size * 0.5);
    let py = -accelY * (size * 0.5);
    fill(255, 50, 50); noStroke();
    ellipse(constrain(px, -size/2, size/2), constrain(py, -size/2, size/2), 18);
}

function drawVibrationGraph(gw, gh) {
    // 枠の描画
    noFill(); stroke(60); strokeWeight(1);
    rectMode(CENTER);
    rect(0, 0, gw, gh);

    // 1.0G基準線
    stroke(100, 100);
    line(-gw/2, 0, gw/2, 0);

    // 波形の描画（枠の中心を0として計算）
    if (historyZ.length > 0) {
        stroke(0, 255, 0); strokeWeight(2); noFill();
        beginShape();
        for (let i = 0; i < historyZ.length; i++) {
            let x = map(i, 0, MAX_HISTORY, -gw/2, gw/2);
            // 0.5G〜1.5Gの範囲を枠の高さにマッピング
            let y = map(historyZ[i], 0.5, 1.5, gh/2, -gh/2);
            vertex(x, constrain(y, -gh/2, gh/2));
        }
        endShape();
    }
}

function windowResized() {
    let container = document.getElementById('canvas-container');
    resizeCanvas(container.offsetWidth, container.offsetHeight);
}
</script>
</body>
</html>
